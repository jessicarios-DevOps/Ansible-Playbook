- name:  Inciar jenkins no systemd
  hosts: localhost
  become: true
  tasks: 
    - name: Start jenkins 
      ansible.builtin.systemd_service:     
        name: jenkins.service
        enabled: false
        state: started
      tags: start-jenkins 
      register: jenkins_status 


    - name: Verificar status do serviço
      ansible.builtin.command: systemctl status jenkins.service --no-pager
      register: status_output
      changed_when: false
      tags: status-do-jenkins 

    - name: Mostrar saída do status
      ansible.builtin.debug:
        var: status_output.stdout_lines
      tags: saída-status-jenkins         
        

- name: Iniciar o Docker no systemd
  hosts: localhost
  become: true
  tasks:

    - name: Iniciar o docker no systemd
      ansible.builtin.systemd_service:
        name: docker.service
        enabled: false
        state: started
      tags: iniciando-docker  
      register: docker_status

    - name: Verificar status do serviço
      ansible.builtin.command: systemctl status docker.service --no-pager
      register: status_output
      changed_when: false
      tags: status-docker
        
    - name: Mostrar saída do status
      ansible.builtin.debug:
        var: status_output.stdout_lines
      tags: saída-status-docker

- name: Iniciar o Sonarqube no docker
  hosts: localhost
  become: true
  vars_files:
    - sonardb_secrets.yml
  tasks:

    - name: Iniciar o Sonarqube
      community.docker.docker_container:
        name: sonarqube 
        image: sonarqube:lts-community
        state: started
        ports:
          - "9000:9000"      
      register: sonarqube_status

    - name: Verificar status do container
      community.docker.docker_container_info:
        name: sonarqube
      register: sonarqube_info
      changed_when: false

    - name: Mostrar status do container
      ansible.builtin.debug:
        var: sonarqube_info.container.State


    - name: Iniciar o Postgres do Sonarqube
      community.docker.docker_container:
        name: sonarqube-db
        image: postgres:13
        state: started
        restart_policy: no
        ports:
          - "5432:5432"
        env: 
          POSTGRES_USER: "{{ vault_postgres_user }}"
          POSTGRES_PASSWORD: "{{ vault_postgres_password }}"
          POSTGRES_DB: "{{ vault_postgres_db }}"   
        volumes: 
          - "0ee0a178f57e2491e94eaad6b7f03ff6a8486f8336be8a6def9d225eb8909b4a:/var/lib/postgresql/data"        
      register: sonarqube_db   
      no_log: true
      tags: iniciar-sonarqube-db
      
    - name: Verificar status do container postgres
      community.docker.docker_container_info:
        name: sonarqube-db
      register: postgres_info
      changed_when: false  

    - name: Mostrar status do container postgres 
      ansible.builtin.debug:
        var: postgres_info.container.State





        
        

        
